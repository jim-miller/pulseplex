name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build & Upload Release Binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: pulseplex
            asset_name: pulseplex-linux-amd64
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: pulseplex
            asset_name: pulseplex-linux-arm64
            use_cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: pulseplex
            asset_name: pulseplex-macos-arm64
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libjack-jackd2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # v1.94.1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@5939f3337e40968c39aa70f5ecb1417a92fb25a0 # v2.75.15

      - name: Build release binary (Cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (Cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Create archive
        id: create_archive
        run: |
          tar -czf ${{ matrix.asset_name }}.tar.gz -C target/${{ matrix.target }}/release/ ${{ matrix.artifact_name }}
          echo "ASSET_PATH=${{ matrix.asset_name }}.tar.gz" >> $GITHUB_OUTPUT

      - name: Upload Release Asset
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda #v3.0.0
        with:
          files: ${{ steps.create_archive.outputs.ASSET_PATH }}
          generate_release_notes: true
