# PulsePlex Default Configuration
# Target: Philips Hue Bridge
# Use 'pulseplex run --select-midi' to pick your hardware.

[midi]
device_name = "{midi_device}"
mappings = { 38 = "snare", 35 = "kick", 46 = "hihat_closed", 49 = "crash_cymbal" }

[[behavior]]
id = "snare"
decay_seconds = 1.25
velocity_curve = "linear"
decay_profile = "linear"

[[behavior]]
id = "kick"
decay_seconds = 3.35
velocity_curve = "soft"
decay_profile = "exponential"

[[behavior]]
id = "hihat_closed"
decay_seconds = 0.25
velocity_curve = "hard"
decay_profile = "linear"

[[behavior]]
id = "crash_cymbal"
decay_seconds = 3.0
velocity_curve = "hard"
decay_profile = "exponential"

[[fixtures]]
id = "hue_snare"
profile_path = "assets/fixtures/hue-color.json"
mode = "3-channel"
start_address = 1

[[fixtures]]
id = "hue_kick"
profile_path = "assets/fixtures/hue-color.json"
mode = "3-channel"
start_address = 4

[[fixtures]]
id = "hue_hihat"
profile_path = "assets/fixtures/hue-color.json"
mode = "3-channel"
start_address = 7

[[fixtures]]
id = "hue_crash"
profile_path = "assets/fixtures/hue-color.json"
mode = "3-channel"
start_address = 10

[[fixture_mappings]]
behavior_id = "snare"
fixture_id = "hue_snare"
capability = "red"

[[fixture_mappings]]
behavior_id = "snare"
fixture_id = "hue_snare"
capability = "green"

[[fixture_mappings]]
behavior_id = "kick"
fixture_id = "hue_kick"
capability = "red"

[[fixture_mappings]]
behavior_id = "hihat_closed"
fixture_id = "hue_hihat"
capability = "red"

[[fixture_mappings]]
behavior_id = "hihat_closed"
fixture_id = "hue_hihat"
capability = "blue"

[[fixture_mappings]]
behavior_id = "crash_cymbal"
fixture_id = "hue_crash"
capability = "red"

[[fixture_mappings]]
behavior_id = "crash_cymbal"
fixture_id = "hue_crash"
capability = "green"

[[fixture_mappings]]
behavior_id = "crash_cymbal"
fixture_id = "hue_crash"
capability = "blue"

[output]
dmx = []

[[targets]]
type = "hue"
bridge_ip = "{bridge_ip}"
bridge_id = "{bridge_id}"
username = "{username}"
client_key = "{client_key}"
area_id = "{area_id}"
patch = [
  { hue_id = 0, dmx_address = 1 },
  { hue_id = 1, dmx_address = 4 },
  { hue_id = 2, dmx_address = 7 },
  { hue_id = 3, dmx_address = 10 }
]

# Uncomment to enable Art-Net output after adding explicit [output].dmx mappings.
# [[targets]]
# type = "artnet"
# target_ip = "127.0.0.1:6454"
# universe = 0

[shutdown]
mode = "blackout"
